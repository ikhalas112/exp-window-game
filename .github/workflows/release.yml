name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: ikhalas112/exp-release-tools/.github/workflows/release-windows.reusable.yml@v0.5.1
    with:
      tools_repo: ikhalas112/exp-release-tools
      tools_version: v0.5.1
      game_name: mock-window-game
      config_json: |
        {
          "distribution": "single_exe",
          "source": "build",
          "build": { "dir": "build", "mockFixture": "fixtures/mock-game" },
          "protector": {
            "inputExe": "game.exe",
            "assetsDir": "assets",
            "outputExe": "MockWindowGame.exe",
            "phase2": true,
            "compressionLevel": 6,
            "chunkSize": 65536,
            "enableProtectedAll": true
          },
          "macos": {
            "appBundle": "MockWindowGame.app",
            "outputFile": "MockWindowGame-macos.zip",
            "versionFileDir": "Contents/Resources",
            "mockFixture": "fixtures/mock-game-macos"
          },
          "r2": { "bucket": "mockwindowgame" },
          "launcher": { "min_version": "1.0.0" },
          "concurrency": { "upload": 8 },
          "cdnBaseUrl": "",
          "runner": { "workspaceMode": "fresh" }
        }
    secrets:
      TOOLS_DOWNLOAD_TOKEN: ${{ secrets.TOOLS_DOWNLOAD_TOKEN }}
